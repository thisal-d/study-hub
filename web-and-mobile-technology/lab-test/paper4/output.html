<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Task Manager — Interactive Prototype (Paper 4)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f4f6fb; min-height: 100vh; }
    .container { max-width: 1150px; margin: 36px auto; padding: 0 20px; }
    h1 { text-align: center; font-size: 2rem; color: #2c3e50; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #aaa; margin-bottom: 30px; font-size: 0.9rem; }

    /* Add Form */
    .add-form { background: white; border-radius: 14px; padding: 24px; margin-bottom: 28px; box-shadow: 0 3px 14px rgba(0,0,0,0.07); }
    .add-form h2 { color: #5b6af7; margin-bottom: 16px; font-size: 1.1rem; padding-bottom: 8px; border-bottom: 2px solid #eef0ff; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .form-full { grid-column: 1/-1; }
    label { display: block; font-weight: 600; color: #666; margin-bottom: 5px; font-size: 0.85rem; }
    input, select, textarea { width: 100%; padding: 9px 12px; border: 1.5px solid #dde2ee; border-radius: 7px; font-size: 0.92rem; font-family: inherit; transition: border-color 0.2s; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #5b6af7; }
    textarea { resize: vertical; min-height: 68px; }
    .btn-add { background: linear-gradient(90deg, #5b6af7, #7e8ef9); color: white; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: transform 0.1s; }
    .btn-add:hover { transform: translateY(-1px); }

    /* Kanban */
    .kanban { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 18px; }
    .column { border-radius: 14px; padding: 18px; min-height: 300px; }
    .column.todo { background: #eef2ff; }
    .column.in-progress { background: #fffbea; }
    .column.done { background: #edfff5; }
    .col-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 10px; border-bottom: 2px solid rgba(0,0,0,0.06); }
    .col-header h2 { font-size: 0.95rem; font-weight: 700; color: #34495e; }
    .col-count { background: rgba(0,0,0,0.08); border-radius: 12px; padding: 2px 9px; font-size: 0.78rem; font-weight: 700; color: #555; }
    .task-card { background: white; border-radius: 10px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-left: 4px solid #ccc; animation: fadeUp 0.25s ease; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(6px); } to { opacity:1; transform:translateY(0); } }
    .task-card.todo-card    { border-left-color: #5b6af7; }
    .task-card.progress-card { border-left-color: #f39c12; }
    .task-card.done-card    { border-left-color: #2ecc71; }
    .task-title { font-weight: 700; color: #2c3e50; font-size: 0.95rem; margin-bottom: 4px; }
    .task-desc  { color: #888; font-size: 0.83rem; margin-bottom: 8px; line-height: 1.45; }
    .task-meta  { font-size: 0.78rem; color: #999; margin-bottom: 10px; }
    .task-meta span { display: inline-block; margin-right: 10px; }
    .task-actions { display: flex; gap: 8px; }
    .btn-edit { background: #3498db; color: white; border: none; padding: 5px 12px; border-radius: 5px; font-size: 0.82rem; cursor: pointer; }
    .btn-del  { background: #e74c3c; color: white; border: none; padding: 5px 12px; border-radius: 5px; font-size: 0.82rem; cursor: pointer; }
    .btn-edit:hover { background: #2980b9; }
    .btn-del:hover  { background: #c0392b; }
    .empty-col { text-align: center; color: #bbb; font-size: 0.85rem; font-style: italic; padding: 20px 0; }

    /* Modal */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); display: flex; align-items: center; justify-content: center; z-index: 200; }
    .modal-overlay.hidden { display: none; }
    .modal { background: white; border-radius: 16px; padding: 30px; width: 500px; max-width: 95vw; box-shadow: 0 8px 40px rgba(0,0,0,0.2); animation: modalIn 0.2s ease; }
    @keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(-10px); } to { opacity:1; transform: scale(1) translateY(0); } }
    .modal h2 { color: #5b6af7; margin-bottom: 20px; font-size: 1.1rem; }
    .modal-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn-save   { background: #5b6af7; color: white; border: none; padding: 9px 20px; border-radius: 7px; font-weight: 700; cursor: pointer; }
    .btn-cancel { background: #ecf0f1; color: #555; border: none; padding: 9px 18px; border-radius: 7px; cursor: pointer; }
    .btn-save:hover { background: #4a58e0; }

    /* Toast */
    .toast { position: fixed; bottom: 24px; right: 24px; background: #2c3e50; color: white; padding: 11px 20px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; box-shadow: 0 4px 14px rgba(0,0,0,0.2); transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 999; }
    .toast.show { transform: translateY(0); opacity: 1; }
    .error { border-color: #e74c3c !important; }
  </style>
</head>
<body>
  <div class="container">
    <h1>✅ Task Manager</h1>
    <p class="subtitle">Paper 4 — Interactive Prototype · Data saved in LocalStorage</p>

    <!-- Add Task Form -->
    <div class="add-form">
      <h2>➕ Add New Task</h2>
      <div class="form-grid">
        <div><label>Title</label><input type="text" id="task-title" placeholder="e.g. Design login page"/></div>
        <div><label>Assigned To</label><input type="text" id="task-assigned" placeholder="e.g. Kasun Perera"/></div>
        <div class="form-full"><label>Description</label><textarea id="task-desc" placeholder="Brief task description..."></textarea></div>
        <div>
          <label>Status</label>
          <select id="task-status">
            <option>Todo</option>
            <option>In Progress</option>
            <option>Done</option>
          </select>
        </div>
        <div><label>Due Date</label><input type="date" id="task-due"/></div>
      </div>
      <button class="btn-add" onclick="addTask()">+ Add Task</button>
    </div>

    <!-- Kanban Board -->
    <div class="kanban">
      <div class="column todo">
        <div class="col-header"><h2>🔵 Todo</h2><span class="col-count" id="count-todo">0</span></div>
        <div id="col-todo"></div>
      </div>
      <div class="column in-progress">
        <div class="col-header"><h2>🟡 In Progress</h2><span class="col-count" id="count-progress">0</span></div>
        <div id="col-progress"></div>
      </div>
      <div class="column done">
        <div class="col-header"><h2>🟢 Done</h2><span class="col-count" id="count-done">0</span></div>
        <div id="col-done"></div>
      </div>
    </div>
  </div>

  <!-- Edit Modal (simulates PUT /api/tasks/:id) -->
  <div class="modal-overlay hidden" id="modal-overlay">
    <div class="modal">
      <h2>✏️ Edit Task</h2>
      <input type="hidden" id="edit-id"/>
      <div class="form-grid">
        <div><label>Title</label><input type="text" id="edit-title"/></div>
        <div><label>Assigned To</label><input type="text" id="edit-assigned"/></div>
        <div class="form-full"><label>Description</label><textarea id="edit-desc"></textarea></div>
        <div>
          <label>Status</label>
          <select id="edit-status">
            <option>Todo</option>
            <option>In Progress</option>
            <option>Done</option>
          </select>
        </div>
        <div><label>Due Date</label><input type="date" id="edit-due"/></div>
      </div>
      <div class="modal-actions">
        <button class="btn-save" onclick="saveEdit()">Save Changes</button>
        <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'paper4_tasks';

    function getTasks() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    function saveTasks(t) { localStorage.setItem(STORAGE_KEY, JSON.stringify(t)); }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2400);
    }

    function addTask() {
      const title = document.getElementById('task-title').value.trim();
      const assigned = document.getElementById('task-assigned').value.trim();
      const desc = document.getElementById('task-desc').value.trim();
      const status = document.getElementById('task-status').value;
      const due = document.getElementById('task-due').value;

      // Basic validation
      if (!title || !assigned || !desc || !due) {
        showToast('⚠️ Please fill in all fields.'); return;
      }

      const task = { id: Date.now(), title, assignedTo: assigned, description: desc, status, dueDate: due };
      const tasks = getTasks();
      tasks.unshift(task);
      saveTasks(tasks);

      // Reset form
      ['task-title','task-assigned','task-desc','task-due'].forEach(id => document.getElementById(id).value = '');
      document.getElementById('task-status').value = 'Todo';

      renderBoard();
      showToast(`Task "${title}" added!`);
    }

    function deleteTask(id) {
      saveTasks(getTasks().filter(t => t.id !== id));
      renderBoard();
      showToast('Task deleted.');
    }

    // ── Open edit modal pre-filled with task data (simulates GET then PUT) ──
    function openEdit(id) {
      const task = getTasks().find(t => t.id === id);
      if (!task) return;
      document.getElementById('edit-id').value       = id;
      document.getElementById('edit-title').value    = task.title;
      document.getElementById('edit-assigned').value = task.assignedTo;
      document.getElementById('edit-desc').value     = task.description;
      document.getElementById('edit-status').value   = task.status;
      document.getElementById('edit-due').value      = task.dueDate;
      document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.add('hidden');
    }

    // ── Save edited task (simulates PUT /api/tasks/:id) ───────────────
    function saveEdit() {
      const id = parseInt(document.getElementById('edit-id').value);
      const tasks = getTasks();
      const idx = tasks.findIndex(t => t.id === id);
      if (idx === -1) return;

      // Full replace — same as PUT in the real backend
      tasks[idx] = {
        id,
        title:       document.getElementById('edit-title').value.trim(),
        assignedTo:  document.getElementById('edit-assigned').value.trim(),
        description: document.getElementById('edit-desc').value.trim(),
        status:      document.getElementById('edit-status').value,
        dueDate:     document.getElementById('edit-due').value,
      };

      if (!tasks[idx].title || !tasks[idx].assignedTo || !tasks[idx].description || !tasks[idx].dueDate) {
        showToast('⚠️ All fields required.'); return;
      }

      saveTasks(tasks);
      closeModal();
      renderBoard();
      showToast('Task updated!');
    }

    // ── Close modal when clicking outside it ─────────────────────────
    document.getElementById('modal-overlay').addEventListener('click', function(e) {
      if (e.target === this) closeModal();
    });

    // ── Render a single task card ─────────────────────────────────────
    function taskCardHtml(task) {
      const cardClass = { 'Todo': 'todo-card', 'In Progress': 'progress-card', 'Done': 'done-card' }[task.status];
      return `
        <div class="task-card ${cardClass}">
          <p class="task-title">${escHtml(task.title)}</p>
          <p class="task-desc">${escHtml(task.description)}</p>
          <p class="task-meta">
            <span>👤 ${escHtml(task.assignedTo)}</span>
            <span>📅 ${task.dueDate}</span>
          </p>
          <div class="task-actions">
            <button class="btn-edit" onclick="openEdit(${task.id})">Edit</button>
            <button class="btn-del" onclick="deleteTask(${task.id})">Delete</button>
          </div>
        </div>`;
    }

    // ── Render the full Kanban board ──────────────────────────────────
    function renderBoard() {
      const tasks = getTasks();
      const cols = { 'Todo': 'col-todo', 'In Progress': 'col-progress', 'Done': 'col-done' };
      const counts = { 'Todo': 0, 'In Progress': 0, 'Done': 0 };

      Object.values(cols).forEach(id => document.getElementById(id).innerHTML = '');

      tasks.forEach(task => {
        const colEl = document.getElementById(cols[task.status]);
        if (colEl) {
          colEl.insertAdjacentHTML('beforeend', taskCardHtml(task));
          counts[task.status]++;
        }
      });

      document.getElementById('count-todo').textContent     = counts['Todo'];
      document.getElementById('count-progress').textContent = counts['In Progress'];
      document.getElementById('count-done').textContent     = counts['Done'];

      // Show empty state in columns with no tasks
      Object.entries(cols).forEach(([status, colId]) => {
        if (counts[status] === 0) {
          document.getElementById(colId).innerHTML = '<p class="empty-col">No tasks here.</p>';
        }
      });
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Seed demo data on first visit ────────────────────────────────
    if (getTasks().length === 0) {
      saveTasks([
        { id: 1, title: 'Set up MongoDB schema', assignedTo: 'Saman', description: 'Define Mongoose models for users and orders.', status: 'Todo', dueDate: '2026-05-10' },
        { id: 2, title: 'Write unit tests', assignedTo: 'Nimali', description: 'Cover all API route handlers with Jest.', status: 'Todo', dueDate: '2026-05-20' },
        { id: 3, title: 'Design login page', assignedTo: 'Kasun', description: 'Design the login page with form validation.', status: 'In Progress', dueDate: '2026-05-15' },
        { id: 4, title: 'Connect frontend to API', assignedTo: 'Dinusha', description: 'Use axios to fetch and display products.', status: 'In Progress', dueDate: '2026-05-12' },
        { id: 5, title: 'Set up project repository', assignedTo: 'Maleesha', description: 'Initialize Git repo and push initial commit.', status: 'Done', dueDate: '2026-05-01' },
      ]);
    }

    renderBoard();
  </script>
</body>
</html>
