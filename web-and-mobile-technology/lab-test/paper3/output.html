<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Product Inventory — Interactive Prototype (Paper 3)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #e8f8f5, #f0fff8); min-height: 100vh; }
    .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
    h1 { text-align: center; font-size: 2.1rem; color: #1a5276; margin-bottom: 6px; }
    .subtitle { text-align: center; color: #999; margin-bottom: 32px; }
    .card { background: white; border-radius: 16px; padding: 26px; margin-bottom: 22px; box-shadow: 0 4px 18px rgba(0,100,80,0.08); }
    .card h2 { color: #1abc9c; font-size: 1.1rem; margin-bottom: 18px; padding-bottom: 8px; border-bottom: 2px solid #e8f8f5; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
    .form-row { margin-bottom: 14px; }
    label { display: block; font-weight: 600; color: #666; margin-bottom: 5px; font-size: 0.87rem; }
    input, select { width: 100%; padding: 10px 13px; border: 1.5px solid #c8e6e0; border-radius: 8px; font-size: 0.93rem; transition: border-color 0.2s; }
    input:focus, select:focus { outline: none; border-color: #1abc9c; }
    .btn-add { background: linear-gradient(90deg, #1abc9c, #16a085); color: white; border: none; padding: 11px 26px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 4px; transition: transform 0.1s; }
    .btn-add:hover { transform: translateY(-1px); }

    /* Search & filter bar */
    .list-toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 16px; flex-wrap: wrap; }
    .search-box { flex: 1; min-width: 180px; padding: 11px 14px; border: 1.5px solid #c8e6e0; border-radius: 8px; font-size: 0.95rem; }
    .search-box:focus { outline: none; border-color: #1abc9c; }
    .cat-filter { padding: 11px 13px; border: 1.5px solid #c8e6e0; border-radius: 8px; font-size: 0.93rem; }
    .prod-count { font-size: 0.82rem; color: #16a085; background: #e8f8f5; padding: 3px 10px; border-radius: 12px; font-weight: 700; white-space: nowrap; }

    /* Product grid */
    .products-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .product-card {
      background: #f0fff8; border: 1.5px solid #c8e6e0;
      border-radius: 12px; padding: 18px; position: relative;
      transition: box-shadow 0.2s, transform 0.15s;
      animation: pop 0.25s ease;
    }
    @keyframes pop { from { opacity:0; transform: scale(0.96); } to { opacity:1; transform: scale(1); } }
    .product-card:hover { box-shadow: 0 4px 16px rgba(26,188,156,0.15); transform: translateY(-2px); }
    .product-card.out-of-stock { opacity: 0.6; background: #f5f5f5; border-color: #ddd; }
    .product-name { font-weight: 700; color: #1a5276; font-size: 1rem; margin-bottom: 4px; }
    .product-price { color: #16a085; font-weight: 700; font-size: 1.05rem; margin-bottom: 8px; }
    .badges { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 12px; }
    .badge { padding: 2px 10px; border-radius: 20px; font-size: 0.76rem; font-weight: 700; }
    .badge-cat { background: #d4efdf; color: #1e8449; }
    .badge-stock { background: #d6eaf8; color: #1a5276; }
    .badge-instock { background: #d5f5e3; color: #1e8449; }
    .badge-outstock { background: #f9ebea; color: #c0392b; }
    .btn-delete { background: #e74c3c; color: white; border: none; padding: 6px 14px; border-radius: 6px; font-size: 0.84rem; cursor: pointer; font-weight: 600; }
    .btn-delete:hover { background: #c0392b; }
    .empty-state { text-align: center; color: #bbb; padding: 32px; font-style: italic; grid-column: 1/-1; }
    .error { border-color: #e74c3c !important; }
    .error-msg { color: #e74c3c; font-size: 0.78rem; margin-top: 3px; }
    .toast { position: fixed; bottom: 24px; right: 24px; background: #1a5276; color: white; padding: 11px 20px; border-radius: 8px; font-size: 0.88rem; font-weight: 600; box-shadow: 0 4px 14px rgba(0,0,0,0.2); transform: translateY(80px); opacity: 0; transition: all 0.3s; z-index: 999; }
    .toast.show { transform: translateY(0); opacity: 1; }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 Product Inventory</h1>
    <p class="subtitle">Paper 3 — Interactive Prototype · Data saved in LocalStorage</p>

    <!-- Add Product Form -->
    <div class="card">
      <h2>➕ Add New Product</h2>
      <div class="form-grid">
        <div class="form-row">
          <label>Product Name</label>
          <input type="text" id="prod-name" placeholder="e.g. Wireless Headphones"/>
          <span class="error-msg" id="name-err"></span>
        </div>
        <div class="form-row">
          <label>Price ($)</label>
          <input type="number" id="prod-price" placeholder="e.g. 89.99" min="0" step="0.01"/>
          <span class="error-msg" id="price-err"></span>
        </div>
        <div class="form-row">
          <label>Category</label>
          <select id="prod-category">
            <option>Electronics</option>
            <option>Clothing</option>
            <option>Food</option>
            <option>Furniture</option>
            <option>Other</option>
          </select>
        </div>
        <div class="form-row">
          <label>Stock Quantity</label>
          <input type="number" id="prod-stock" placeholder="e.g. 25" min="0"/>
          <span class="error-msg" id="stock-err"></span>
        </div>
      </div>
      <button class="btn-add" onclick="addProduct()">+ Add Product</button>
    </div>

    <!-- Product List -->
    <div class="card">
      <h2>📦 Products</h2>
      <div class="list-toolbar">
        <!-- Search simulates GET /api/products/search?q= -->
        <input class="search-box" type="text" id="search-input" placeholder="🔍 Search by name or category..." oninput="renderProducts()"/>
        <!-- Category filter simulates GET /api/products?category= -->
        <select class="cat-filter" id="cat-filter" onchange="renderProducts()">
          <option value="">All Categories</option>
          <option>Electronics</option>
          <option>Clothing</option>
          <option>Food</option>
          <option>Furniture</option>
          <option>Other</option>
        </select>
        <span class="prod-count" id="prod-count">0 products</span>
      </div>
      <div class="products-grid" id="products-grid">
        <div class="empty-state">No products yet.</div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    const STORAGE_KEY = 'paper3_products';

    function getProducts() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    function saveProducts(p) { localStorage.setItem(STORAGE_KEY, JSON.stringify(p)); }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2400);
    }

    function validate() {
      let ok = true;
      ['name-err','price-err','stock-err'].forEach(id => document.getElementById(id).textContent = '');
      ['prod-name','prod-price','prod-stock'].forEach(id => document.getElementById(id).classList.remove('error'));

      if (!document.getElementById('prod-name').value.trim()) {
        document.getElementById('prod-name').classList.add('error');
        document.getElementById('name-err').textContent = 'Product name is required.';
        ok = false;
      }
      const price = parseFloat(document.getElementById('prod-price').value);
      if (isNaN(price) || price < 0) {
        document.getElementById('prod-price').classList.add('error');
        document.getElementById('price-err').textContent = 'Enter a valid price.';
        ok = false;
      }
      const stock = parseInt(document.getElementById('prod-stock').value);
      if (isNaN(stock) || stock < 0) {
        document.getElementById('prod-stock').classList.add('error');
        document.getElementById('stock-err').textContent = 'Enter a valid stock quantity.';
        ok = false;
      }
      return ok;
    }

    function addProduct() {
      if (!validate()) return;
      const stock = parseInt(document.getElementById('prod-stock').value);
      const product = {
        id: Date.now(),
        name: document.getElementById('prod-name').value.trim(),
        price: parseFloat(document.getElementById('prod-price').value),
        category: document.getElementById('prod-category').value,
        stock,
        inStock: stock > 0,
      };
      const products = getProducts();
      products.unshift(product);
      saveProducts(products);

      document.getElementById('prod-name').value = '';
      document.getElementById('prod-price').value = '';
      document.getElementById('prod-stock').value = '';
      document.getElementById('prod-category').value = 'Electronics';

      renderProducts();
      showToast(`"${product.name}" added!`);
    }

    function deleteProduct(id) {
      saveProducts(getProducts().filter(p => p.id !== id));
      renderProducts();
      showToast('Product deleted.');
    }

    // ── Filter & search — simulates backend GET /search?q= + category filter ──
    function getFilteredProducts() {
      const query = document.getElementById('search-input').value.toLowerCase().trim();
      const cat   = document.getElementById('cat-filter').value;
      return getProducts().filter(p => {
        const matchSearch = !query || p.name.toLowerCase().includes(query) || p.category.toLowerCase().includes(query);
        const matchCat = !cat || p.category === cat;
        return matchSearch && matchCat;
      });
    }

    function renderProducts() {
      const products = getFilteredProducts();
      const grid = document.getElementById('products-grid');
      document.getElementById('prod-count').textContent = `${products.length} product${products.length !== 1 ? 's' : ''}`;

      if (products.length === 0) {
        grid.innerHTML = '<div class="empty-state">No products found.</div>';
        return;
      }

      grid.innerHTML = products.map(p => `
        <div class="product-card${p.inStock ? '' : ' out-of-stock'}">
          <p class="product-name">${escHtml(p.name)}</p>
          <p class="product-price">$${p.price.toFixed(2)}</p>
          <div class="badges">
            <span class="badge badge-cat">${escHtml(p.category)}</span>
            <span class="badge badge-stock">📦 ${p.stock} in stock</span>
            ${p.inStock
              ? '<span class="badge badge-instock">✅ In Stock</span>'
              : '<span class="badge badge-outstock">❌ Out of Stock</span>'}
          </div>
          <button class="btn-delete" onclick="deleteProduct(${p.id})">Delete</button>
        </div>
      `).join('');
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Seed demo data on first visit ────────────────────────────────
    if (getProducts().length === 0) {
      saveProducts([
        { id: 1, name: 'Wireless Headphones', price: 89.99, category: 'Electronics', stock: 25, inStock: true },
        { id: 2, name: 'Smart Watch', price: 149.00, category: 'Electronics', stock: 8, inStock: true },
        { id: 3, name: 'Bluetooth Speaker', price: 59.99, category: 'Electronics', stock: 0, inStock: false },
      ]);
    }

    renderProducts();
  </script>
</body>
</html>
