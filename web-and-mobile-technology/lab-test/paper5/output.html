<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Event Registration — Interactive Prototype (Paper 5)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); min-height: 100vh; color: #e0e0e0; }
    .container { max-width: 1150px; margin: 0 auto; padding: 36px 20px; }
    h1 { text-align: center; font-size: 2.2rem; color: #e0aaff; margin-bottom: 4px; letter-spacing: -0.5px; }
    .subtitle { text-align: center; color: #666; margin-bottom: 34px; }

    /* Form Card */
    .form-card { background: rgba(255,255,255,0.06); border: 1px solid rgba(224,170,255,0.2); border-radius: 16px; padding: 26px; margin-bottom: 24px; backdrop-filter: blur(10px); }
    .form-card h2 { color: #c77dff; margin-bottom: 18px; font-size: 1.05rem; padding-bottom: 10px; border-bottom: 1px solid rgba(199,125,255,0.2); }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .form-full { grid-column: 1/-1; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: #aaa; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
    input, select {
      width: 100%; padding: 9px 12px;
      border: 1px solid rgba(199,125,255,0.3); border-radius: 8px;
      background: rgba(255,255,255,0.07); color: #e0e0e0; font-size: 0.92rem;
      transition: border-color 0.2s;
    }
    input::placeholder { color: #666; }
    input:focus, select:focus { outline: none; border-color: #c77dff; }
    select option { background: #1e1e3a; color: #e0e0e0; }
    .btn-create { background: linear-gradient(90deg, #7b2ff7, #c77dff); color: white; border: none; padding: 10px 24px; border-radius: 8px; font-weight: 700; cursor: pointer; margin-top: 10px; transition: transform 0.1s; }
    .btn-create:hover { transform: translateY(-1px); }

    /* Filter Bar */
    .filter-bar { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; flex-wrap: wrap; }
    .filter-bar label { color: #bbb; font-size: 0.9rem; font-weight: 600; white-space: nowrap; margin: 0; text-transform: none; letter-spacing: 0; }
    .filter-bar select { max-width: 200px; }
    .event-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .event-header h2 { color: #c77dff; font-size: 1.05rem; }
    .event-header-count { font-size: 0.82rem; color: #c77dff; background: rgba(199,125,255,0.15); padding: 3px 10px; border-radius: 12px; font-weight: 700; }

    /* Events Grid */
    .events-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
    .event-card {
      background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12);
      border-radius: 14px; padding: 20px; position: relative; backdrop-filter: blur(8px);
      transition: transform 0.15s, box-shadow 0.2s;
      animation: cardIn 0.3s ease;
    }
    @keyframes cardIn { from { opacity:0; transform:scale(0.95); } to { opacity:1; transform:scale(1); } }
    .event-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(123,47,247,0.2); }
    .event-card.full { border-color: rgba(231,76,60,0.5); }
    .event-name { font-size: 1rem; font-weight: 700; color: #e0aaff; margin-bottom: 6px; }
    .event-venue { color: #888; font-size: 0.85rem; margin-bottom: 10px; }
    .badges { display: flex; gap: 7px; flex-wrap: wrap; margin-bottom: 12px; }
    .badge { padding: 3px 10px; border-radius: 20px; font-size: 0.76rem; font-weight: 700; }
    .badge-cat   { background: rgba(199,125,255,0.2); color: #c77dff; }
    .badge-date  { background: rgba(52,152,219,0.2); color: #74b9ff; }
    .badge-full  { background: rgba(231,76,60,0.25); color: #e74c3c; }
    .badge-spots-ok   { background: rgba(46,213,115,0.2); color: #2ecc71; }
    .badge-spots-warn { background: rgba(243,156,18,0.2); color: #f39c12; }
    .capacity-label { font-size: 0.8rem; color: #888; margin-bottom: 6px; }
    progress { width: 100%; height: 7px; border-radius: 4px; margin-bottom: 14px; appearance: none; }
    progress::-webkit-progress-bar { background: rgba(255,255,255,0.1); border-radius: 4px; }
    progress::-webkit-progress-value { background: linear-gradient(90deg, #7b2ff7, #c77dff); border-radius: 4px; }
    progress.full-bar::-webkit-progress-value { background: #e74c3c; }
    .event-actions { display: flex; gap: 8px; }
    .btn-register { background: rgba(199,125,255,0.2); color: #c77dff; border: 1px solid rgba(199,125,255,0.4); padding: 7px 14px; border-radius: 7px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-register:hover:not(:disabled) { background: rgba(199,125,255,0.35); }
    .btn-register:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-del { background: rgba(231,76,60,0.2); color: #e74c3c; border: 1px solid rgba(231,76,60,0.4); padding: 7px 14px; border-radius: 7px; font-size: 0.85rem; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-del:hover { background: rgba(231,76,60,0.35); }

    /* Alert Banner (replaces alert() for better UX) */
    .alert-banner {
      position: fixed; top: 24px; left: 50%; transform: translateX(-50%) translateY(-80px);
      background: #e74c3c; color: white; padding: 12px 28px; border-radius: 10px;
      font-weight: 700; font-size: 0.95rem; box-shadow: 0 4px 20px rgba(231,76,60,0.4);
      transition: transform 0.35s; z-index: 999; white-space: nowrap;
    }
    .alert-banner.show { transform: translateX(-50%) translateY(0); }
    .empty-state { text-align: center; color: #555; padding: 32px; font-style: italic; grid-column: 1/-1; }
    .error-label { color: #e74c3c; font-size: 0.78rem; margin-top: 3px; }

    @media (max-width: 768px) {
      .form-grid { grid-template-columns: 1fr; }
      .events-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🎉 Event Registration System</h1>
    <p class="subtitle">Paper 5 — Interactive Prototype · Data saved in LocalStorage</p>

    <!-- Create Event Form -->
    <div class="form-card">
      <h2>➕ Create New Event</h2>
      <div class="form-grid">
        <div class="form-full">
          <label>Event Name</label>
          <input type="text" id="ev-name" placeholder="e.g. React Workshop 2026"/>
          <span class="error-label" id="name-err"></span>
        </div>
        <div>
          <label>Venue</label>
          <input type="text" id="ev-venue" placeholder="e.g. Lecture Hall A"/>
          <span class="error-label" id="venue-err"></span>
        </div>
        <div>
          <label>Category</label>
          <select id="ev-category">
            <option>Workshop</option>
            <option>Seminar</option>
            <option>Sports</option>
            <option>Cultural</option>
            <option>Other</option>
          </select>
        </div>
        <div>
          <label>Date</label>
          <input type="date" id="ev-date"/>
          <span class="error-label" id="date-err"></span>
        </div>
        <div>
          <label>Capacity</label>
          <input type="number" id="ev-capacity" placeholder="e.g. 50" min="1"/>
          <span class="error-label" id="cap-err"></span>
        </div>
      </div>
      <button class="btn-create" onclick="addEvent()">+ Create Event</button>
    </div>

    <!-- Filter Bar (simulates GET /api/events?category=...) -->
    <div class="filter-bar">
      <label>Filter by Category:</label>
      <select id="cat-filter" onchange="renderEvents()">
        <option value="">All Categories</option>
        <option>Workshop</option>
        <option>Seminar</option>
        <option>Sports</option>
        <option>Cultural</option>
        <option>Other</option>
      </select>
    </div>

    <!-- Events Grid -->
    <div class="event-header">
      <h2>📅 Upcoming Events</h2>
      <span class="event-header-count" id="ev-count">0 events</span>
    </div>
    <div class="events-grid" id="events-grid">
      <div class="empty-state">No events yet.</div>
    </div>
  </div>

  <!-- Alert banner (replaces browser alert for "Event is full") -->
  <div class="alert-banner" id="alert-banner"></div>

  <script>
    const STORAGE_KEY = 'paper5_events';

    function getEvents() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); }
    function saveEvents(e) { localStorage.setItem(STORAGE_KEY, JSON.stringify(e)); }

    // ── Show a non-blocking alert banner ─────────────────────────────
    function showAlert(msg) {
      const el = document.getElementById('alert-banner');
      el.textContent = msg; el.classList.add('show');
      setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ── Validate add-event form ───────────────────────────────────────
    function validate() {
      let ok = true;
      ['name-err','venue-err','date-err','cap-err'].forEach(id => document.getElementById(id).textContent = '');
      if (!document.getElementById('ev-name').value.trim())   { document.getElementById('name-err').textContent  = 'Required.'; ok = false; }
      if (!document.getElementById('ev-venue').value.trim())  { document.getElementById('venue-err').textContent = 'Required.'; ok = false; }
      if (!document.getElementById('ev-date').value)          { document.getElementById('date-err').textContent  = 'Required.'; ok = false; }
      const cap = parseInt(document.getElementById('ev-capacity').value);
      if (isNaN(cap) || cap < 1)                              { document.getElementById('cap-err').textContent   = 'Must be ≥ 1.'; ok = false; }
      return ok;
    }

    function addEvent() {
      if (!validate()) return;
      const ev = {
        id: Date.now(),
        eventName: document.getElementById('ev-name').value.trim(),
        venue: document.getElementById('ev-venue').value.trim(),
        category: document.getElementById('ev-category').value,
        date: document.getElementById('ev-date').value,
        capacity: parseInt(document.getElementById('ev-capacity').value),
        registeredCount: 0,
      };
      const events = getEvents();
      events.push(ev);
      // Sort by date ascending (mirrors the backend sort({ date: 1 }))
      events.sort((a, b) => new Date(a.date) - new Date(b.date));
      saveEvents(events);

      document.getElementById('ev-name').value = '';
      document.getElementById('ev-venue').value = '';
      document.getElementById('ev-date').value = '';
      document.getElementById('ev-capacity').value = '';
      document.getElementById('ev-category').value = 'Workshop';

      renderEvents();
      showAlert(`✅ "${ev.eventName}" created!`);
    }

    function deleteEvent(id) {
      saveEvents(getEvents().filter(e => e.id !== id));
      renderEvents();
    }

    // ── Register — simulates PATCH /api/events/:id/register ──────────
    // Key logic: registeredCount must be < capacity (enforced here as it would be server-side)
    function registerEvent(id) {
      const events = getEvents();
      const ev = events.find(e => e.id === id);
      if (!ev) return;

      // ⚡ Capacity check — this is the critical backend validation in Paper 5
      if (ev.registeredCount >= ev.capacity) {
        showAlert('🔴 Event is full — registration closed!');
        return;
      }

      ev.registeredCount++;
      saveEvents(events);
      renderEvents();
    }

    // ── Format date for display ───────────────────────────────────────
    function fmtDate(dateStr) {
      const d = new Date(dateStr + 'T00:00:00');
      return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // ── Build capacity badge (green / yellow / red) ───────────────────
    function spotsBadge(ev) {
      const left = ev.capacity - ev.registeredCount;
      if (left <= 0)         return `<span class="badge badge-full">🔴 Full</span>`;
      if (left <= 5)         return `<span class="badge badge-spots-warn">🟡 ${left} spot${left>1?'s':''} left</span>`;
      return                        `<span class="badge badge-spots-ok">🟢 ${left} spots left</span>`;
    }

    // ── Render events (applies category filter) ───────────────────────
    function renderEvents() {
      const cat   = document.getElementById('cat-filter').value;
      const all   = getEvents();
      // Filter simulates GET /api/events?category=... on the backend
      const shown = cat ? all.filter(e => e.category === cat) : all;

      document.getElementById('ev-count').textContent = `${shown.length} event${shown.length !== 1 ? 's' : ''}`;
      const grid = document.getElementById('events-grid');

      if (shown.length === 0) {
        grid.innerHTML = '<div class="empty-state">No events found.</div>';
        return;
      }

      grid.innerHTML = shown.map(ev => {
        const isFull = ev.registeredCount >= ev.capacity;
        const pct    = ev.capacity > 0 ? (ev.registeredCount / ev.capacity) * 100 : 0;
        return `
          <div class="event-card${isFull ? ' full' : ''}">
            <p class="event-name">${escHtml(ev.eventName)}</p>
            <p class="event-venue">📍 ${escHtml(ev.venue)}</p>
            <div class="badges">
              <span class="badge badge-cat">${escHtml(ev.category)}</span>
              <span class="badge badge-date">📅 ${fmtDate(ev.date)}</span>
              ${spotsBadge(ev)}
            </div>
            <p class="capacity-label">${ev.registeredCount} / ${ev.capacity} registered</p>
            <progress value="${ev.registeredCount}" max="${ev.capacity}" class="${isFull ? 'full-bar' : ''}"></progress>
            <div class="event-actions">
              <button class="btn-register" onclick="registerEvent(${ev.id})" ${isFull ? 'disabled' : ''}>Register</button>
              <button class="btn-del" onclick="deleteEvent(${ev.id})">Delete</button>
            </div>
          </div>`;
      }).join('');
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Seed demo events on first visit ──────────────────────────────
    if (getEvents().length === 0) {
      saveEvents([
        { id: 1, eventName: 'React Workshop 2026', venue: 'Lecture Hall A', category: 'Workshop', date: '2026-05-20', capacity: 30, registeredCount: 18 },
        { id: 2, eventName: 'Annual Sports Day',   venue: 'Main Ground',      category: 'Sports',   date: '2026-05-15', capacity: 50, registeredCount: 50 },
        { id: 3, eventName: 'AI Seminar: Future of Tech', venue: 'Conference Room B', category: 'Seminar', date: '2026-05-22', capacity: 50, registeredCount: 15 },
        { id: 4, eventName: 'Cultural Night 2026', venue: 'Auditorium',       category: 'Cultural', date: '2026-05-28', capacity: 100, registeredCount: 97 },
      ]);
    }

    renderEvents();
  </script>
</body>
</html>
