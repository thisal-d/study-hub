<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Book Tracker — Interactive Prototype (Paper 1)</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #e8eeff 0%, #f0f4ff 100%);
      min-height: 100vh; color: #333;
    }
    .container { max-width: 820px; margin: 40px auto; padding: 0 20px; }
    h1 { text-align: center; font-size: 2.2rem; color: #2c3e50; margin-bottom: 8px; letter-spacing: -0.5px; }
    .subtitle { text-align: center; color: #888; margin-bottom: 36px; font-size: 0.95rem; }
    .card { background: white; border-radius: 16px; padding: 28px; margin-bottom: 24px; box-shadow: 0 4px 20px rgba(74,108,247,0.10); }
    .card h2 { font-size: 1.15rem; color: #4a6cf7; margin-bottom: 20px; padding-bottom: 10px; border-bottom: 2px solid #eef1ff; display: flex; align-items: center; gap: 8px; }
    .form-row { margin-bottom: 16px; }
    label { display: block; font-weight: 600; color: #555; margin-bottom: 6px; font-size: 0.9rem; }
    input[type="text"], select {
      width: 100%; padding: 11px 14px;
      border: 1.5px solid #dde2ee; border-radius: 8px;
      font-size: 0.95rem; color: #333; background: #fafbff;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus, select:focus { outline: none; border-color: #4a6cf7; }
    .checkbox-row { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .checkbox-row input { width: 18px; height: 18px; accent-color: #4a6cf7; cursor: pointer; }
    .checkbox-row label { margin: 0; font-weight: 600; color: #555; cursor: pointer; }
    .btn-add {
      background: linear-gradient(90deg, #4a6cf7, #6a8afb);
      color: white; border: none; padding: 12px 28px; border-radius: 9px;
      font-size: 1rem; font-weight: 600; cursor: pointer; letter-spacing: 0.3px;
      box-shadow: 0 3px 12px rgba(74,108,247,0.25); transition: transform 0.1s, box-shadow 0.2s;
    }
    .btn-add:hover { transform: translateY(-1px); box-shadow: 0 5px 18px rgba(74,108,247,0.35); }
    .btn-add:active { transform: translateY(0); }
    .list-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .book-count { font-size: 0.85rem; color: #888; background: #eef1ff; padding: 3px 10px; border-radius: 12px; font-weight: 600; }
    .book-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
    .book-card {
      display: flex; justify-content: space-between; align-items: center;
      background: #f8faff; border: 1.5px solid #e0e7ff;
      border-radius: 12px; padding: 18px 22px;
      transition: box-shadow 0.2s, transform 0.15s;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; transform: translateY(0); } }
    .book-card:hover { box-shadow: 0 4px 14px rgba(74,108,247,0.12); transform: translateY(-1px); }
    .book-info h3 { color: #2c3e50; font-size: 1.05rem; margin-bottom: 4px; }
    .book-info .author { color: #7f8c8d; font-size: 0.88rem; margin-bottom: 6px; }
    .badges { display: flex; gap: 8px; flex-wrap: wrap; }
    .badge { display: inline-block; padding: 3px 11px; border-radius: 20px; font-size: 0.78rem; font-weight: 700; }
    .badge-genre { background: #e8f4fd; color: #2980b9; }
    .badge-read { background: #eafaf1; color: #27ae60; }
    .badge-unread { background: #fef9e7; color: #e67e22; }
    .btn-delete {
      background: #e74c3c; color: white; border: none;
      padding: 8px 18px; border-radius: 7px; font-size: 0.88rem;
      cursor: pointer; font-weight: 600; transition: background 0.2s;
      white-space: nowrap;
    }
    .btn-delete:hover { background: #c0392b; }
    .empty-state { text-align: center; color: #aaa; padding: 32px; font-style: italic; }
    .toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #2c3e50; color: white; padding: 12px 22px;
      border-radius: 8px; font-size: 0.9rem; font-weight: 600;
      box-shadow: 0 4px 16px rgba(0,0,0,0.2);
      transform: translateY(80px); opacity: 0;
      transition: transform 0.3s, opacity 0.3s; z-index: 999;
    }
    .toast.show { transform: translateY(0); opacity: 1; }
    .error { border-color: #e74c3c !important; }
    .error-msg { color: #e74c3c; font-size: 0.8rem; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📚 Book Tracker</h1>
    <p class="subtitle">Paper 1 — Interactive Prototype · Data saved in LocalStorage</p>

    <!-- Add Book Form -->
    <div class="card">
      <h2>📝 Add New Book</h2>
      <div class="form-row">
        <label for="title">Title:</label>
        <input type="text" id="title" placeholder="e.g. The Great Gatsby" />
        <span class="error-msg" id="title-err"></span>
      </div>
      <div class="form-row">
        <label for="author">Author:</label>
        <input type="text" id="author" placeholder="e.g. F. Scott Fitzgerald" />
        <span class="error-msg" id="author-err"></span>
      </div>
      <div class="form-row">
        <label for="genre">Genre:</label>
        <select id="genre">
          <option value="Fiction">Fiction</option>
          <option value="Non-Fiction">Non-Fiction</option>
          <option value="Science">Science</option>
          <option value="History">History</option>
          <option value="Other">Other</option>
        </select>
      </div>
      <div class="checkbox-row">
        <input type="checkbox" id="isRead" />
        <label for="isRead">Already Read?</label>
      </div>
      <button class="btn-add" onclick="addBook()">+ Add Book</button>
    </div>

    <!-- Book List -->
    <div class="card">
      <div class="list-header">
        <h2 style="margin:0; border:none; padding:0;">📖 My Reading List</h2>
        <span class="book-count" id="book-count">0 books</span>
      </div>
      <ul class="book-list" id="book-list">
        <li class="empty-state">No books yet. Add some above! 📖</li>
      </ul>
    </div>
  </div>

  <!-- Toast notification -->
  <div class="toast" id="toast"></div>

  <script>
    // ── Storage key for this app ──────────────────────────────────────
    const STORAGE_KEY = 'paper1_books';

    // ── Load books from LocalStorage ─────────────────────────────────
    function getBooks() {
      return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
    }

    // ── Save books to LocalStorage ────────────────────────────────────
    function saveBooks(books) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(books));
    }

    // ── Show a toast notification ─────────────────────────────────────
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // ── Validate form inputs, return true if valid ────────────────────
    function validate() {
      let valid = true;
      const title = document.getElementById('title');
      const author = document.getElementById('author');

      document.getElementById('title-err').textContent = '';
      document.getElementById('author-err').textContent = '';
      title.classList.remove('error');
      author.classList.remove('error');

      if (!title.value.trim()) {
        title.classList.add('error');
        document.getElementById('title-err').textContent = 'Title is required.';
        valid = false;
      }
      if (!author.value.trim()) {
        author.classList.add('error');
        document.getElementById('author-err').textContent = 'Author is required.';
        valid = false;
      }
      return valid;
    }

    // ── Add a new book ────────────────────────────────────────────────
    function addBook() {
      if (!validate()) return;

      const book = {
        id: Date.now(),                                 // simple unique ID
        title: document.getElementById('title').value.trim(),
        author: document.getElementById('author').value.trim(),
        genre: document.getElementById('genre').value,
        isRead: document.getElementById('isRead').checked,
      };

      const books = getBooks();
      books.unshift(book);   // add to beginning so newest appears first
      saveBooks(books);

      // Reset form
      document.getElementById('title').value = '';
      document.getElementById('author').value = '';
      document.getElementById('genre').value = 'Fiction';
      document.getElementById('isRead').checked = false;

      renderBooks();
      showToast(`"${book.title}" added to your list!`);
    }

    // ── Delete a book by ID ───────────────────────────────────────────
    function deleteBook(id) {
      const books = getBooks().filter(b => b.id !== id);
      saveBooks(books);
      renderBooks();
      showToast('Book removed.');
    }

    // ── Render the book list to the DOM ──────────────────────────────
    function renderBooks() {
      const books = getBooks();
      const list = document.getElementById('book-list');
      const counter = document.getElementById('book-count');

      counter.textContent = `${books.length} book${books.length !== 1 ? 's' : ''}`;

      if (books.length === 0) {
        list.innerHTML = '<li class="empty-state">No books yet. Add some above! 📖</li>';
        return;
      }

      list.innerHTML = books.map(book => `
        <li class="book-card">
          <div class="book-info">
            <h3>${escHtml(book.title)}</h3>
            <p class="author">by ${escHtml(book.author)}</p>
            <div class="badges">
              <span class="badge badge-genre">${escHtml(book.genre)}</span>
              ${book.isRead
                ? '<span class="badge badge-read">✅ Read</span>'
                : '<span class="badge badge-unread">📖 Unread</span>'}
            </div>
          </div>
          <button class="btn-delete" onclick="deleteBook(${book.id})">Delete</button>
        </li>
      `).join('');
    }

    // ── Escape HTML to prevent XSS ────────────────────────────────────
    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Initial render on page load ───────────────────────────────────
    renderBooks();

    // ── Allow pressing Enter in input fields to submit ─────────────
    ['title','author'].forEach(id => {
      document.getElementById(id).addEventListener('keydown', e => {
        if (e.key === 'Enter') addBook();
      });
    });
  </script>
</body>
</html>
