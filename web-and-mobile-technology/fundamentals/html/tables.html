<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h4> Simple Table </h4>
    
    <table border="1" cellpadding="5" cellspacing="0">
        <tr>
            <td>item2</td>
            <td>item3</td>
            <td>item4</td>
        </tr>

        <tr>
            <td>item5</td>
            <td>item6</td>
            <td>item7</td>
        </tr>
    </table>

    
    <h4> Table with colspan </h4>
    
    <table border="1" cellpadding="5" cellspacing="0">
        <tr>
            <td rowspan="2">item1</td>
            <td>item2</td>
            <td>item3</td>
            <td>item4</td>
        </tr>

        <tr>
            <td>item5</td>
            <td>item6</td>
            <td>item7</td>
        </tr>
    </table>


    <h4> Table with rowspan and colspan </h4>

    <table border="1" cellspacing="0">
        <tr>
            <td colspan="5">Acedemic Year</td>
            <td rowspan="3"> rowspan 3</td>
        </tr>

        <tr>
            <td>Sem 1</td>
            <td>4C0SC000W</td>
            <td rowspan="2"> rowspan 2</td>
            <td rowspan="2"> rowspan 2</td>
            <td rowspan="2"> rowspan 2</td>
        </tr>
        <tr>
            <td>Sem 2</td>
            <td>4C0SC005W</td>
        </tr>
    </table>

</body>
</html>
